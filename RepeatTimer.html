<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Repeat Timer</title>

<style>
body{
  margin:0;
  background:#0f1724;
  color:#e6eef8;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  text-align:center;
  padding:20px;
}

.now-time{
  font-size:40px;
  font-weight:700;
  color:#8fbaff;
  margin-bottom:20px;
  font-variant-numeric: tabular-nums;
}

.timer-display{
  font-size:60px;
  font-weight:700;
  margin:20px 0;
  font-variant-numeric: tabular-nums;
}

.controls{
  margin-top:20px;
  display:flex;
  justify-content:center;
  gap:10px;
}

button{
  padding:12px 20px;
  border-radius:10px;
  border:0;
  font-size:20px;
  font-weight:600;
  cursor:pointer;
}

#startBtn{
  background:linear-gradient(90deg,#7c5cff,#5ad0ff);
  color:#041025;
}

#stopBtn{
  background:#ff6666;
  color:white;
}

input[type="number"]{
  width:100px;
  font-size:28px;
  padding:6px;
  border-radius:8px;
  border:1px solid #555;
  text-align:center;
}
</style>
</head>
<body>

<div id="nowTime" class="now-time"></div>

<div>
  <input id="minInput" type="number" min="0" value="5"> 分
  <input id="secInput" type="number" min="0" max="59" value="0"> 秒
</div>

<div id="timerDisplay" class="timer-display">05:00</div>

<div class="controls">
  <button id="startBtn">開始</button>
  <button id="stopBtn">停止</button>
</div>

<script>
(() => {
  const nowTime = document.getElementById("nowTime");
  const timerDisplay = document.getElementById("timerDisplay");
  const minInput = document.getElementById("minInput");
  const secInput = document.getElementById("secInput");
  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");

  let remaining = 0;
  let loopTimer = null;
  let wakeLock = null;
  let lastSetMin = 5;
  let lastSetSec = 0;

  /* ★ Wake Lock API */
  async function enableWakeLock(){
    try{
      wakeLock = await navigator.wakeLock.request("screen");
    }catch(e){
      console.log("WakeLock error:", e);
    }
  }

  function disableWakeLock(){
    if(wakeLock){
      wakeLock.release();
      wakeLock = null;
    }
  }

  /* 現在時刻表示 */
  function updateClock(){
    const d = new Date();
    const hh = String(d.getHours()).padStart(2,"0");
    const mm = String(d.getMinutes()).padStart(2,"0");
    const ss = String(d.getSeconds()).padStart(2,"0");
    nowTime.textContent = `${hh}:${mm}:${ss}`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  /* 表示更新 */
  function updateDisplay(){
    const m = String(Math.floor(remaining / 60)).padStart(2,"0");
    const s = String(remaining % 60).padStart(2,"0");
    timerDisplay.textContent = `${m}:${s}`;
  }

  /* バイブレーション（5秒間） */
  function vibrate5sec(){
    if(navigator.vibrate){
      navigator.vibrate([500,500,500,500,500]);
    }
  }

  /* カウントダウン開始（ループ） */
  async function startLoop(){
    lastSetMin = Number(minInput.value);
    lastSetSec = Number(secInput.value);

    remaining = lastSetMin * 60 + lastSetSec;
    if(remaining <= 0){
      alert("時間を設定してください");
      return;
    }

    await enableWakeLock();

    if(loopTimer) clearInterval(loopTimer);

    loopTimer = setInterval(() => {
      remaining--;
      updateDisplay();

      if(remaining <= 0){
        vibrate5sec();

        /* 次のループ開始 */
        remaining = lastSetMin * 60 + lastSetSec;
        updateDisplay();
      }
    }, 1000);
  }

  /* 停止 */
  function stopLoop(){
    if(loopTimer){
      clearInterval(loopTimer);
      loopTimer = null;
    }
    disableWakeLock();

    /* 入力欄を前回値に戻す */
    minInput.value = lastSetMin;
    secInput.value = lastSetSec;

    remaining = lastSetMin * 60 + lastSetSec;
    updateDisplay();
  }

  startBtn.onclick = startLoop;
  stopBtn.onclick = stopLoop;

  /* 初期表示 */
  updateDisplay();

})();
</script>
</body>
</html>
