<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Repeat Timer</title>

<style>
body{
  margin:0;
  background:#0f1724;
  color:#e6eef8;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  transition: background 0.1s;
}

.container{
  width:100%;
  max-width:720px;
  padding:20px;
  text-align:center;
}

.now-date{
  font-size:18px;
  color:#8fbaff;
  margin-bottom:4px;
  font-variant-numeric: tabular-nums;
}

.now-time{
  font-size:48px;
  font-weight:700;
  color:#8fbaff;
  font-variant-numeric: tabular-nums;
}

.timer-box{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:12px;
  margin-top:30px;
}

.time-left{
  font-size:48px;
  font-weight:700;
  font-variant-numeric: tabular-nums;
  margin-bottom:6px;
}

.controls{
  margin-top:24px;
  display:flex;
  justify-content:center;
  gap:14px;
}

button{
  padding:10px 14px;
  border-radius:10px;
  border:0;
  font-weight:600;
  cursor:pointer;
}

#startBtn{
  background:linear-gradient(90deg,#7c5cff,#5ad0ff);
  color:#041025;
}

#stopBtn{
  background:#ff6666;
  color:white;
}

input[type="number"]{
  width:70px;
  font-size:26px;
  padding:6px;
  border-radius:8px;
  border:1px solid #555;
  text-align:center;
  font-variant-numeric: tabular-nums;
}
</style>
</head>
<body>
<div class="container">

  <div id="nowDate" class="now-date"></div>
  <div id="nowTime" class="now-time"></div>

  <!-- 指定時刻入力 -->
  <div style="margin-top:20px;">
    <input id="endH" type="number" min="0" max="23"> :
    <input id="endM" type="number" min="0" max="59"> :
    <input id="endS" type="number" min="0" max="59">
  </div>

  <div class="timer-box">
    <div id="timeLeft" class="time-left">--:--:--</div>
    <div id="status">終了時刻を指定してください</div>
  </div>

  <!-- 繰り返しタイマー -->
  <div style="margin-top:20px;">
    <input id="repMin" type="number" min="0" value="5"> 分
    <input id="repSec" type="number" min="0" max="59" value="0"> 秒
  </div>

  <div class="controls">
    <button id="startBtn">開始</button>
    <button id="stopBtn">停止</button>
  </div>

</div>

<script>
(() => {
  const nowDate = document.getElementById("nowDate");
  const nowTime = document.getElementById("nowTime");
  const timeLeft = document.getElementById("timeLeft");
  const status = document.getElementById("status");

  const endH = document.getElementById("endH");
  const endM = document.getElementById("endM");
  const endS = document.getElementById("endS");

  const repMin = document.getElementById("repMin");
  const repSec = document.getElementById("repSec");

  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");

  let nextTarget = null;
  let mainTimer = null;
  let wakeLock = null;

  const pad = n => String(n).padStart(2,"0");
  const week = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  /* Wake Lock */
  async function enableWakeLock(){
    try{
      wakeLock = await navigator.wakeLock.request("screen");
    }catch(e){}
  }
  function disableWakeLock(){
    if(wakeLock){
      wakeLock.release();
      wakeLock = null;
    }
  }

  /* Wake Lock 再取得（iOS Safari 対策） */
  document.addEventListener("visibilitychange", () => {
    if (wakeLock && document.visibilityState === "visible") {
      enableWakeLock();
    }
  });

  /* 現在時刻表示 */
  function updateNow(){
    const d = new Date();
    nowDate.textContent =
      `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}/${week[d.getDay()]}`;
    nowTime.textContent =
      `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }
  setInterval(updateNow,1000);
  updateNow();

  /* 入力補正 */
  function sanitize(){
    endH.value = Math.min(23, Math.max(0, Number(endH.value)||0));
    endM.value = Math.min(59, Math.max(0, Number(endM.value)||0));
    endS.value = Math.min(59, Math.max(0, Number(endS.value)||0));
    repMin.value = Math.max(0, Number(repMin.value)||0);
    repSec.value = Math.min(59, Math.max(0, Number(repSec.value)||0));
  }

  /* フラッシュ（12回） */
  function flashScreen(){
    let count = 0;
    const flash = setInterval(()=>{
      document.body.style.background =
        (count % 2 === 0) ? "#ffffff" : "#0f1724";
      count++;
      if(count > 12){
        clearInterval(flash);
        document.body.style.background = "#0f1724";
      }
    }, 150);
  }

  /* 次回終了時刻を計算（誤差ゼロ） */
  function calcNextTarget(){
    const add = Number(repMin.value) * 60 + Number(repSec.value);
    nextTarget = new Date(nextTarget.getTime() + add * 1000);

    endH.value = nextTarget.getHours();
    endM.value = nextTarget.getMinutes();
    endS.value = nextTarget.getSeconds();
  }

  /* メインループ（誤差ゼロ） */
  function startMainLoop(){
    if(mainTimer) clearInterval(mainTimer);

    mainTimer = setInterval(()=>{
      const now = new Date();
      const diff = Math.floor((nextTarget - now) / 1000);

      if(diff >= 0){
        const h = pad(Math.floor(diff/3600));
        const m = pad(Math.floor(diff%3600/60));
        const s = pad(diff%60);
        timeLeft.textContent = `${h}:${m}:${s}`;
        status.textContent = "残り時間";
      }else{
        flashScreen();
        calcNextTarget();
      }
    },1000);
  }

  /* 開始 */
  async function start(){
    sanitize();

    const h = Number(endH.value);
    const m = Number(endM.value);
    const s = Number(endS.value);

    const now = new Date();
    nextTarget = new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,m,s);
    if(nextTarget <= now){
      nextTarget.setDate(nextTarget.getDate()+1);
    }

    startBtn.disabled = true;

    await enableWakeLock();
    startMainLoop();
  }

  /* 停止 */
  function stop(){
    startBtn.disabled = false;
    disableWakeLock();

    if(mainTimer){
      clearInterval(mainTimer);
      mainTimer = null;
    }

    nextTarget = null;
    timeLeft.textContent = "--:--:--";
    status.textContent = "停止中";

    document.body.style.background = "#0f1724";
  }

  startBtn.onclick = start;
  stopBtn.onclick = stop;

  /* 初期値：現在時刻＋1分 */
  (() => {
    const d = new Date(Date.now() + 60000);
    endH.value = d.getHours();
    endM.value = d.getMinutes();
    endS.value = 0;
  })();

})();
</script>
</body>
</html>
