<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TimerLimit</title>

<style>
body{
  margin:0;
  background:#0f1724;
  color:#e6eef8;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:100%;
  max-width:720px;
  padding:20px;
  text-align:center;
}

.now-date{
  font-size:18px;
  color:#8fbaff;
  margin-bottom:4px;
  font-variant-numeric: tabular-nums;
}

.now-time{
  font-size:48px;
  font-weight:700;
  color:#8fbaff;
  font-variant-numeric: tabular-nums;
}

.timer-box{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:12px;
  margin-top:30px;
}

.time-left{
  font-size:48px;
  font-weight:700;
  font-variant-numeric: tabular-nums;
  margin-bottom:6px;
}

.controls{
  margin-top:24px;
  display:flex;
  justify-content:center;
  gap:14px;
}

button{
  padding:10px 14px;
  border-radius:10px;
  border:0;
  font-weight:600;
  cursor:pointer;
}

#startBtn{
  background:linear-gradient(90deg,#7c5cff,#5ad0ff);
  color:#041025;
}

#resetBtn{
  background:transparent;
  border:1px solid rgba(255,255,255,0.2);
  color:#9aa4b2;
}

.presets{
  margin-top:24px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.presetBtn{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  color:#d0d7e2;
  padding:8px 12px;
  border-radius:8px;
}

input[type="time"]{
  font-size:28px;
  font-weight:700;
}
</style>
</head>
<body>
<div class="container">

  <div id="nowDate" class="now-date"></div>
  <div id="nowTime" class="now-time"></div>

  <div class="timer-box">
    <div id="timeLeft" class="time-left">--:--:--</div>
    <div id="status">終了時刻を指定してください</div>
  </div>

  <div class="controls">
    <button id="startBtn">開始</button>
    <input id="timeInput" type="time">
    <button id="resetBtn">リセット</button>
  </div>

  <div class="presets">
    <button class="presetBtn" data-time="12:00">12:00</button>
    <button class="presetBtn" data-time="15:59">15:59</button>
    <button class="presetBtn" data-time="17:40">17:40</button>
    <button class="presetBtn" data-time="18:59">18:59</button>
    <button class="presetBtn" data-time="19:47">19:47</button>
    <button class="presetBtn" data-time="20:37">20:37</button>
    <button class="presetBtn" data-time="20:40">20:40</button>
  </div>

</div>

<script>
(() => {
  const nowDate = document.getElementById("nowDate");
  const nowTime = document.getElementById("nowTime");
  const timeLeft = document.getElementById("timeLeft");
  const status = document.getElementById("status");
  const timeInput = document.getElementById("timeInput");
  const startBtn = document.getElementById("startBtn");
  const resetBtn = document.getElementById("resetBtn");
  const presets = document.querySelectorAll(".presetBtn");

  let target = null;

  /* ★ Wake Lock API */
  let wakeLock = null;

  async function enableWakeLock(){
    try{
      wakeLock = await navigator.wakeLock.request("screen");
    }catch(e){
      console.log("WakeLock error:", e);
    }
  }

  function disableWakeLock(){
    if(wakeLock){
      wakeLock.release();
      wakeLock = null;
    }
  }

  const pad = n => String(n).padStart(2,"0");
  const week = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  function updateNow(){
    const d = new Date();
    nowDate.textContent =
      `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}/${week[d.getDay()]}`;
    nowTime.textContent =
      `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    updateTimer();
  }

  function updateTimer(){
    if(!target){
      timeLeft.textContent = "--:--:--";
      return;
    }

    const now = new Date();
    now.setMilliseconds(0);

    const diff = Math.floor((target - now) / 1000);

    const h = Math.floor(Math.abs(diff)/3600);
    const m = Math.floor(Math.abs(diff)%3600/60);
    const s = Math.abs(diff)%60;

    timeLeft.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
    status.textContent = diff >= 0 ? "残り時間" : "経過時間";
    timeLeft.style.color = diff >= 0 ? "#e6eef8" : "#ff6b6b";
  }

  async function start(){
    const val = timeInput.value;
    if(!val){
      alert("時刻を入力してください");
      return;
    }

    const [h,m] = val.split(":").map(Number);

    const now = new Date();
    now.setMilliseconds(0);

    target = new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,m,0);

    if(target <= now){
      target.setDate(target.getDate()+1);
    }

    updateTimer();
    startBtn.disabled = true;

    /* ★ 画面ロック防止 ON */
    await enableWakeLock();
  }

  function reset(){
    target = null;
    startBtn.disabled = false;
    updateTimer();
    status.textContent = "終了時刻を指定してください";

    /* ★ 画面ロック防止 OFF */
    disableWakeLock();
  }

  presets.forEach(btn=>{
    btn.onclick = ()=> timeInput.value = btn.dataset.time;
  });

  /* 初期値：1分後 */
  (() => {
    const d = new Date(Date.now() + 60000);
    timeInput.value = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  })();

  setInterval(updateNow,1000);
  updateNow();

  startBtn.onclick = start;
  resetBtn.onclick = reset;

})();
</script>
</body>
</html>
