<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Checklist</title>

<style>
body{
  margin:0;
  background:#0f1724;
  color:white;
  font-family:-apple-system;
  overflow:hidden;
  -webkit-user-select:none;
  user-select:none;
}

/* スクロール領域 */
#zoomArea{
  position:absolute;
  top:0;
  left:0;
  right:0;
  bottom:0;
  overflow:auto;
  background:#000;
}

/* PNG 図面（1290×1835） */
#imageLayer{
  position:relative;
  width:1290px;
  height:1835px;
  background:url("img/checklist.png") no-repeat;
  background-size:100% 100%;
  transform-origin: 0 0;
}

/* チェック（✔・赤・32px） */
.check{
  position:absolute;
  width:32px;
  height:32px;
  font-size:32px;
  font-weight:900;
  color:red;
  line-height:32px;
  text-align:center;
  user-select:none;
}

/* リセットボタン */
#resetBtn{
  position:fixed;
  top:10px;
  right:10px;
  z-index:2000;
  padding:10px 16px;
  background:#ff6666;
  border-radius:8px;
  border:0;
  color:white;
  font-size:16px;
}
</style>
</head>
<body>

<button id="resetBtn">リセット</button>

<div id="zoomArea">
  <div id="imageLayer"></div>
</div>

<script>
const layer = document.getElementById("imageLayer");
let longPress = false;
let touchMoved = false;

/* ズーム用変数 */
let zoom = 1;
let startDist = 0;

/* 2本指距離計算 */
function getDistance(touches){
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

/* ピンチ開始 */
layer.addEventListener("touchstart", e=>{
  if(e.touches.length === 2){
    startDist = getDistance(e.touches);
  }
});

/* ピンチ中 */
layer.addEventListener("touchmove", e=>{
  if(e.touches.length === 2){
    e.preventDefault();  // ← Safari で必要
    const newDist = getDistance(e.touches);
    const scale = newDist / startDist;

    zoom *= scale;
    zoom = Math.max(0.5, Math.min(3.0, zoom)); // A の範囲

    layer.style.transform = `scale(${zoom})`;

    startDist = newDist;
  } else {
    touchMoved = true; // スクロール判定
  }
}, { passive:false });

/* タップでチェック追加 */
layer.addEventListener("touchend", e=>{
  if(longPress) return;
  if(touchMoved){ touchMoved = false; return; }
  if(e.target.classList.contains("check")) return;

  const rect = layer.getBoundingClientRect();
  const x = (e.changedTouches[0].clientX - rect.left) / zoom;
  const y = (e.changedTouches[0].clientY - rect.top) / zoom;

  const div = document.createElement("div");
  div.className = "check";
  div.textContent = "✔";
  div.style.left = (x - 16) + "px";
  div.style.top  = (y - 16) + "px";

  layer.appendChild(div);

  attachLongPress(div);
});

/* 長押しで即削除 */
function attachLongPress(el){
  let timer;

  el.addEventListener("touchstart", ()=>{
    longPress = false;
    timer = setTimeout(()=>{
      longPress = true;
      el.remove();
    }, 500);
  });

  el.addEventListener("touchend", ()=>{
    clearTimeout(timer);
    setTimeout(()=> longPress = false, 50);
  });
}

/* リセットボタン：全削除 */
document.getElementById("resetBtn").onclick = ()=>{
  document.querySelectorAll(".check").forEach(c=> c.remove());
};
</script>

</body>
</html>
