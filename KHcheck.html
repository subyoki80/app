<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Checklist</title>

<style>
body{
  margin:0;
  background:#0f1724;
  color:white;
  font-family:-apple-system;
  overflow:hidden;
  -webkit-user-select:none;
  user-select:none;
}

/* スクロール領域 */
#zoomArea{
  position:absolute;
  inset:0;
  overflow:auto;
  background:#000;
}

/* ズーム対象（画像＋チェック） */
#zoomContainer{
  position:relative;
  width:1290px;
  height:1835px;
  transform-origin:0 0;
}

/* 画像レイヤー */
#imageLayer{
  position:absolute;
  inset:0;
  background:url("img/checklist.png") no-repeat;
  background-size:100% 100%;
}

/* ✔ レイヤー */
#checkLayer{
  position:absolute;
  inset:0;
}

.check{
  position:absolute;
  width:32px;
  height:32px;
  font-size:32px;
  font-weight:900;
  color:red;
  line-height:32px;
  text-align:center;
  user-select:none;
}

/* ★ transform の外に固定して常に表示 */
#resetBtn{
  position:fixed;
  top:10px;
  right:10px;
  z-index:999999;
  pointer-events:auto;
  padding:10px 16px;
  background:#ff6666;
  border-radius:8px;
  border:0;
  color:white;
  font-size:16px;
}
</style>
</head>
<body>

<!-- ★ transform の外に置く -->
<button id="resetBtn">リセット</button>

<div id="zoomArea">
  <div id="zoomContainer">
    <div id="imageLayer"></div>
    <div id="checkLayer"></div>
  </div>
</div>

<script>
const zoomContainer = document.getElementById("zoomContainer");
const checkLayer    = document.getElementById("checkLayer");

let zoom = 1;
let startDist = 0;
let isPinching = false;
let longPress = false;
let touchMoved = false;
let pinchEndTimer = null;
let lastTap = 0;

/* 2本指距離 */
function getDistance(t){
  const dx = t[0].clientX - t[1].clientX;
  const dy = t[0].clientY - t[1].clientY;
  return Math.hypot(dx, dy);
}

/* ピンチ開始 */
zoomContainer.addEventListener("touchstart", e=>{
  if(e.touches.length === 2){
    isPinching = true;
    clearTimeout(pinchEndTimer);

    startDist = getDistance(e.touches);

    const rect = zoomContainer.getBoundingClientRect();
    const cx = (e.touches[0].clientX + e.touches[1].clientX)/2 - rect.left;
    const cy = (e.touches[0].clientY + e.touches[1].clientY)/2 - rect.top;

    zoomContainer.style.transformOrigin = `${cx}px ${cy}px`;
  }
});

/* ピンチ中 or スクロール中 */
zoomContainer.addEventListener("touchmove", e=>{
  if(e.touches.length === 2){
    e.preventDefault();

    const newDist = getDistance(e.touches);
    const scale   = newDist / startDist;

    zoom *= scale;
    zoom = Math.max(0.3, Math.min(3.0, zoom));

    zoomContainer.style.transform = `scale(${zoom})`;

    startDist = newDist;
  }else{
    touchMoved = true;
  }
},{passive:false});

/* ピンチ終了 */
zoomContainer.addEventListener("touchend", e=>{
  if(e.touches.length === 0){
    pinchEndTimer = setTimeout(()=>{ isPinching = false; }, 200);
  }
});

/* ★ ダブルタップズーム完全無効化 */
zoomContainer.addEventListener("touchend", e=>{
  const now = Date.now();
  if(now - lastTap < 300){
    e.preventDefault();
    lastTap = 0;
    return;
  }
  lastTap = now;
},{passive:false});

/* タップで✔追加 */
zoomContainer.addEventListener("touchend", e=>{
  if(isPinching) return;
  if(longPress)  return;
  if(touchMoved){ touchMoved = false; return; }
  if(e.target.classList.contains("check")) return;

  const rect = zoomContainer.getBoundingClientRect();
  const x = (e.changedTouches[0].clientX - rect.left) / zoom;
  const y = (e.changedTouches[0].clientY - rect.top) / zoom;

  const div = document.createElement("div");
  div.className = "check";
  div.textContent = "✔";
  div.style.left = (x - 16) + "px";
  div.style.top  = (y - 16) + "px";

  checkLayer.appendChild(div);

  attachLongPress(div);
});

/* 長押しで削除 */
function attachLongPress(el){
  let timer;

  el.addEventListener("touchstart", ()=>{
    longPress = false;
    timer = setTimeout(()=>{
      longPress = true;
      el.remove();
    }, 500);
  });

  el.addEventListener("touchend", ()=>{
    clearTimeout(timer);
    setTimeout(()=>{ longPress = false; }, 50);
  });
}

/* リセット */
document.getElementById("resetBtn").onclick = ()=>{
  document.querySelectorAll(".check").forEach(c=> c.remove());
};
</script>

</body>
</html>
