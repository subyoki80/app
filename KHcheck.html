<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Checklist</title>

<style>
body{
  margin:0;
  background:#0f1724;
  color:white;
  font-family:-apple-system;
  overflow:hidden;
  -webkit-user-select:none;
  user-select:none; /* ← 長押しの範囲選択を完全無効化 */
}

/* ズーム可能エリア */
#zoomArea{
  width:100%;
  height:100vh;
  overflow:scroll;
  touch-action:pinch-zoom; /* ← ズーム有効 */
  background:#000;
}

/* PNG 図面（1290×1835） */
#imageLayer{
  position:relative;
  width:1290px;
  height:1835px;
  background:url("img/checklist.png") no-repeat;
  background-size:100% 100%;
}

/* チェック（✔・赤・太線・32px） */
.check{
  position:absolute;
  width:32px;
  height:32px;
  font-size:32px;
  font-weight:900;
  color:red;
  line-height:32px;
  text-align:center;
  user-select:none;
}

/* リセットボタン */
#resetBtn{
  position:fixed;
  top:10px;
  right:10px;
  z-index:2000;
  padding:10px 16px;
  background:#ff6666;
  border-radius:8px;
  border:0;
  color:white;
  font-size:16px;
}
</style>
</head>
<body>

<button id="resetBtn">リセット</button>

<div id="zoomArea">
  <div id="imageLayer"></div>
</div>

<script>
const layer = document.getElementById("imageLayer");
let longPressTimer = null;

/* クリックでチェック追加 */
layer.addEventListener("click", e=>{
  if(e.target.classList.contains("check")) return;

  const rect = layer.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const div = document.createElement("div");
  div.className = "check";
  div.textContent = "✔";
  div.style.left = (x - 16) + "px";
  div.style.top  = (y - 16) + "px";

  layer.appendChild(div);

  attachLongPress(div);
});

/* 長押しで即削除（確認なし） */
function attachLongPress(el){
  el.addEventListener("touchstart", startPress);
  el.addEventListener("mousedown", startPress);

  el.addEventListener("touchend", cancelPress);
  el.addEventListener("mouseup", cancelPress);
  el.addEventListener("mouseleave", cancelPress);

  function startPress(e){
    e.stopPropagation();
    longPressTimer = setTimeout(()=>{
      el.remove();   // ← 即削除
    }, 500);
  }

  function cancelPress(){
    clearTimeout(longPressTimer);
  }
}

/* リセットボタン：全削除 */
document.getElementById("resetBtn").onclick = ()=>{
  document.querySelectorAll(".check").forEach(c=> c.remove());
};
</script>

</body>
</html>
