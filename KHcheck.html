<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
<title>Checklist</title>

<style>
body{
  margin:0;
  background:#0f1724;
  color:white;
  font-family:-apple-system;
  overflow:hidden;
  -webkit-user-select:none;
  user-select:none;
}

/* スクロール領域（touch-action は指定しない） */
#zoomArea{
  position:absolute;
  top:0;
  left:0;
  right:0;
  bottom:0;
  overflow:auto;
  background:#000;
}

/* PNG 図面（1290×1835） */
#imageLayer{
  position:relative;
  width:1290px;
  height:1835px;
  background:url("img/checklist.png") no-repeat;
  background-size:100% 100%;
}

/* チェック（✔・赤・32px） */
.check{
  position:absolute;
  width:32px;
  height:32px;
  font-size:32px;
  font-weight:900;
  color:red;
  line-height:32px;
  text-align:center;
  user-select:none;
}

/* リセットボタン */
#resetBtn{
  position:fixed;
  top:10px;
  right:10px;
  z-index:2000;
  padding:10px 16px;
  background:#ff6666;
  border-radius:8px;
  border:0;
  color:white;
  font-size:16px;
}
</style>
</head>
<body>

<button id="resetBtn">リセット</button>

<div id="zoomArea">
  <div id="imageLayer"></div>
</div>

<script>
const layer = document.getElementById("imageLayer");
let longPress = false;
let isScrolling = false;
let touchMoved = false;

/* スクロール開始判定 */
layer.addEventListener("touchmove", ()=>{
  touchMoved = true;   // ← 指が動いたらタップ扱いにしない
});

/* タップでチェック追加（touchend 使用） */
layer.addEventListener("touchend", e=>{
  if(longPress) return;
  if(touchMoved) { touchMoved = false; return; }  // ← スクロール中は無効
  if(e.target.classList.contains("check")) return;

  const rect = layer.getBoundingClientRect();
  const x = e.changedTouches[0].clientX - rect.left;
  const y = e.changedTouches[0].clientY - rect.top;

  const div = document.createElement("div");
  div.className = "check";
  div.textContent = "✔";
  div.style.left = (x - 16) + "px";
  div.style.top  = (y - 16) + "px";

  layer.appendChild(div);

  attachLongPress(div);
});

/* 長押しで即削除 */
function attachLongPress(el){
  let timer;

  el.addEventListener("touchstart", start);
  el.addEventListener("mousedown", start);

  el.addEventListener("touchend", end);
  el.addEventListener("mouseup", end);
  el.addEventListener("mouseleave", end);

  function start(e){
    longPress = false;
    timer = setTimeout(()=>{
      longPress = true;
      el.remove();
    }, 500);
  }

  function end(){
    clearTimeout(timer);
    setTimeout(()=> longPress = false, 50);
  }
}

/* リセットボタン：全削除 */
document.getElementById("resetBtn").onclick = ()=>{
  document.querySelectorAll(".check").forEach(c=> c.remove());
};
</script>

</body>
</html>
