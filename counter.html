<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Simple Counter</title>
<style>
body{
  margin:0;
  background:#0f1724;
  color:#e6eef8;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:100%;
  max-width:720px;
  padding:20px;
  text-align:center;
}

/* ★ カウンター数字（揺れゼロ） */
.count{
  font-size:80px;
  font-weight:700;
  font-variant-numeric: tabular-nums;
  margin-bottom:30px;
}

/* ボタン配置 */
.controls{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:30px;
}

/* ボタン共通 */
button{
  padding:16px 24px;
  border-radius:12px;
  border:0;
  font-size:24px;
  font-weight:700;
  cursor:pointer;
  touch-action: manipulation;
}

/* +1 */
#plusBtn{
  background:linear-gradient(90deg,#7c5cff,#5ad0ff);
  color:#041025;
}

/* -1 */
#minusBtn{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  color:#d0d7e2;
}

/* Reset */
#resetBtn{
  background:transparent;
  border:1px solid rgba(255,255,255,0.2);
  color:#9aa4b2;
}

/* ★ ログ表示 */
.log-area{
  margin-top:20px;
  text-align:left;
  max-height:40vh;
  overflow-y:auto;
  padding-right:10px;
}

.log-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
  font-size:18px;
  font-weight:600;
  font-variant-numeric: tabular-nums;
  color:#d0d7e2;
}

.log-delete{
  background:transparent;
  border:1px solid rgba(255,255,255,0.2);
  color:#9aa4b2;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  cursor:pointer;
}

/* ★ ALL Delete ボタン（最下部） */
#allDeleteBtn{
  margin-top:16px;
  width:100%;
  padding:10px;
  border-radius:8px;
  background:rgba(255,80,80,0.15);
  border:1px solid rgba(255,80,80,0.4);
  color:#ff8080;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>
<body>
<div class="container">

  <div id="count" class="count">0</div>

  <div class="controls">
    <button id="minusBtn">-1</button>
    <button id="plusBtn">+1</button>
    <button id="resetBtn">Reset</button>
  </div>

  <div id="logArea" class="log-area"></div>

  <button id="allDeleteBtn">ALL Delete</button>

</div>

<script>
(() => {
  const countEl = document.getElementById("count");
  const plusBtn = document.getElementById("plusBtn");
  const minusBtn = document.getElementById("minusBtn");
  const resetBtn = document.getElementById("resetBtn");
  const logArea = document.getElementById("logArea");
  const allDeleteBtn = document.getElementById("allDeleteBtn");

  /* ★ ローカル保存 */
  let count = Number(localStorage.getItem("simpleCounter") || 0);
  let logs = JSON.parse(localStorage.getItem("simpleCounterLogs") || "[]");

  countEl.textContent = count;

  function save(){
    localStorage.setItem("simpleCounter", count);
    localStorage.setItem("simpleCounterLogs", JSON.stringify(logs));
  }

  function renderLogs(){
    logArea.innerHTML = "";
    logs.forEach((value, index) => {
      const div = document.createElement("div");
      div.className = "log-item";
      div.innerHTML = `
        <span>${value}</span>
        <button class="log-delete" data-index="${index}">Delete</button>
      `;
      logArea.appendChild(div);
    });

    /* Delete ボタン */
    document.querySelectorAll(".log-delete").forEach(btn => {
      btn.onclick = () => {
        const i = Number(btn.dataset.index);
        logs.splice(i, 1);
        save();
        renderLogs();
      };
    });
  }

  renderLogs();

  function update(){
    countEl.textContent = count;
    save();
  }

  plusBtn.onclick = () => {
    count++;
    update();
  };

  minusBtn.onclick = () => {
    count--;
    update();
  };

  resetBtn.onclick = () => {
    logs.push(count);  // ★ 時間なし、数値のみ
    count = 0;
    update();
    renderLogs();
  };

  allDeleteBtn.onclick = () => {
    logs = [];
    save();
    renderLogs();
  };
})();
</script>
</body>
</html>
