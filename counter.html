<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simple Counter</title>
<style>
body{
  margin:0;
  background:#0f1724;
  color:#e6eef8;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:100%;
  max-width:720px;
  padding:20px;
  text-align:center;
}

/* ★ カウンター数字（揺れゼロ） */
.count{
  font-size:80px;
  font-weight:700;
  font-variant-numeric: tabular-nums;
  margin-bottom:30px;
}

/* ボタン配置 */
.controls{
  display:flex;
  justify-content:center;
  gap:20px;
}

/* ボタン共通 */
button{
  padding:16px 24px;
  border-radius:12px;
  border:0;
  font-size:24px;
  font-weight:700;
  cursor:pointer;
}

/* +1 */
#plusBtn{
  background:linear-gradient(90deg,#7c5cff,#5ad0ff);
  color:#041025;
}

/* -1 */
#minusBtn{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  color:#d0d7e2;
}

/* Reset */
#resetBtn{
  background:transparent;
  border:1px solid rgba(255,255,255,0.2);
  color:#9aa4b2;
}
</style>
</head>
<body>
<div class="container">

  <div id="count" class="count">0</div>

  <div class="controls">
    <button id="minusBtn">-1</button>
    <button id="plusBtn">+1</button>
    <button id="resetBtn">Reset</button>
  </div>

</div>

<script>
(() => {
  const countEl = document.getElementById("count");
  const plusBtn = document.getElementById("plusBtn");
  const minusBtn = document.getElementById("minusBtn");
  const resetBtn = document.getElementById("resetBtn");

  // ★ ローカル保存から読み込み
  let count = Number(localStorage.getItem("simpleCounter") || 0);
  countEl.textContent = count;

  function update(){
    countEl.textContent = count;
    localStorage.setItem("simpleCounter", count);
  }

  plusBtn.onclick = () => {
    count++;
    update();
  };

  minusBtn.onclick = () => {
    count--;
    update();
  };

  resetBtn.onclick = () => {
    count = 0;
    update();
  };
})();
</script>
</body>
</html>
