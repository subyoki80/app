<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Simple Counter</title>
<style>
body{
  margin:0;
  background:#0f1724;
  color:#e6eef8;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ★ All Delete の上に置く透明スペーサー（2段分に増量） */
.top-spacer{
  height:90px;        /* ← ここを増やした（50→90） */
  pointer-events:none;
  opacity:0;
}

/* Header（固定風） */
header{
  flex:0 0 auto;
  padding:10px;
  background:#0f1724;
  text-align:center;
  box-sizing:border-box;
}

#allDeleteBtn{
  width:90%;
  padding:10px;
  border-radius:8px;
  background:rgba(255,80,80,0.15);
  border:1px solid rgba(255,80,80,0.4);
  color:#ff8080;
  font-size:16px;
  cursor:pointer;
  touch-action:manipulation;
}

/* Main（ログエリア） */
main{
  flex:1 1 auto;
  overflow-y:auto;
  padding:10px 20px;
  box-sizing:border-box;
}

/* ログ側のスペーサー（バウンス対策） */
.log-spacer{
  height:60px;
  pointer-events:none;
  opacity:0;
}

/* ログ1行 */
.log-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.log-value{
  flex:1;
  text-align:center;
  font-size:22px;
  font-weight:700;
  font-variant-numeric: tabular-nums;
}

.log-delete{
  background:transparent;
  border:1px solid rgba(255,255,255,0.2);
  color:#9aa4b2;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  cursor:pointer;
  touch-action:manipulation;
}

/* Footer（固定風） */
footer{
  flex:0 0 auto;
  padding:20px 0;
  background:#0f1724;
  text-align:center;
  box-sizing:border-box;
}

.count{
  font-size:70px;
  font-weight:700;
  font-variant-numeric: tabular-nums;
  margin-bottom:20px;
}

.controls{
  display:flex;
  justify-content:center;
  gap:20px;
}

button{
  padding:16px 24px;
  border-radius:12px;
  border:0;
  font-size:24px;
  font-weight:700;
  cursor:pointer;
  touch-action:manipulation;
}

#plusBtn{
  background:linear-gradient(90deg,#7c5cff,#5ad0ff);
  color:#041025;
}

#minusBtn{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  color:#d0d7e2;
}

#resetBtn{
  background:transparent;
  border:1px solid rgba(255,255,255,0.2);
  color:#9aa4b2;
}
</style>
</head>
<body>

<!-- ★ All Delete の上に透明スペーサー（2段分） -->
<div class="top-spacer"></div>

<header>
  <button id="allDeleteBtn">ALL Delete</button>
</header>

<main id="logArea">
  <div class="log-spacer"></div>
</main>

<footer>
  <div id="count" class="count">0</div>
  <div class="controls">
    <button id="minusBtn">-1</button>
    <button id="plusBtn">+1</button>
    <button id="resetBtn">Reset</button>
  </div>
</footer>

<script>
(() => {
  const countEl = document.getElementById("count");
  const plusBtn = document.getElementById("plusBtn");
  const minusBtn = document.getElementById("minusBtn");
  const resetBtn = document.getElementById("resetBtn");
  const logArea = document.getElementById("logArea");
  const allDeleteBtn = document.getElementById("allDeleteBtn");

  let count = Number(localStorage.getItem("simpleCounter") || 0);
  let logs = JSON.parse(localStorage.getItem("simpleCounterLogs") || "[]");

  countEl.textContent = count;

  function save(){
    localStorage.setItem("simpleCounter", count);
    localStorage.setItem("simpleCounterLogs", JSON.stringify(logs));
  }

  function renderLogs(){
    logArea.innerHTML = '<div class="log-spacer"></div>';
    logs.forEach((value, index) => {
      const div = document.createElement("div");
      div.className = "log-item";
      div.innerHTML = `
        <span class="log-value">${value}</span>
        <button class="log-delete" data-index="${index}">Delete</button>
      `;
      logArea.appendChild(div);
    });

    document.querySelectorAll(".log-delete").forEach(btn => {
      btn.onclick = () => {
        logs.splice(Number(btn.dataset.index), 1);
        save();
        renderLogs();
      };
    });

    logArea.scrollTop = logArea.scrollHeight;
  }

  renderLogs();

  function update(){
    countEl.textContent = count;
    save();
  }

  plusBtn.onclick = () => { count++; update(); };
  minusBtn.onclick = () => { count--; update(); };

  resetBtn.onclick = () => {
    logs.push(count);
    count = 0;
    update();
    renderLogs();
  };

  allDeleteBtn.onclick = () => {
    logs = [];
    save();
    renderLogs();
  };
})();
</script>
</body>
</html>
